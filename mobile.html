<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a" id="themeColorMeta">
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="dark-theme">

    <main id="mobile-root">      
        <div style="display: none;">
            <input type="text" id="settingsDbUrlInput">
            <input type="password" id="settingsApiKeyInput">
            <input type="text" id="taskInput">
            <select id="viewSelect"></select>
            <select id="projectFilter"></select>
        </div>
        
        <div id="mobile-header-dynamic"></div>

        <div class="mobile-bottom-bar">
            <div class="mobile-input-wrapper">
                <input type="text" id="mobileTaskInput" placeholder="Añadir tarea..." class="mobile-input">
                <button onclick="window.addMobileTask()" class="mobile-add-btn">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="24" height="24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                </button>
            </div>
            
            <div class="mobile-nav-actions">
                <button class="nav-btn" onclick="window.toggleViewMenu()">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <button class="nav-btn" onclick="window.toggleSettingsMenu()">
                    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </button>
            </div>
        </div>

        <div id="mobileTaskList" class="task-list" style="padding: 15px; padding-bottom: 100px;">
            <div style="text-align: center; color: var(--text-secondary); padding: 40px 0;">Cargando motor de tareas...</div>
        </div>

<div id="viewMenuModal" class="mobile-fullscreen-view hidden">
            <div class="fullscreen-header">
                <button onclick="window.toggleViewMenu()" class="fullscreen-close">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="24" height="24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h3 class="fullscreen-title">Navegación</h3>
                <div style="width: 24px;"></div> 
            </div>
            <div id="modalDynamicContent" class="fullscreen-body"></div>
        </div>
        
        <nav class="bottom-nav">
            <button class="nav-btn" onclick="window.toggleViewMenu()">
                <span style="font-size: 20px;">📅</span>
                <span>Vistas</span>
            </button>
            
            <button class="nav-btn" onclick="window.toggleSettingsMenu()">
                <span style="font-size: 20px;">🌗</span>
                <span>Tema</span>
            </button>
        </nav>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Este gatillo garantiza que renderTasks se dispare aunque app.js se demore
            setTimeout(() => {
                if(window.renderTasks) window.renderTasks();
            }, 800);
        });
    </script>

<script src="js/config.js"></script>
    <script src="js/cloud.js"></script>
    <script src="js/model.js"></script>
    <script src="js/engine.js"></script>

    <script>
        window.initSpeechRecognition = function() {};
        window.updateDateDisplay = function() {};
        window.showSyncStatus = function(status) {};
        window.showNotice = function(mensaje) {};
        window.refreshAllDropdowns = function() {};
        window.renderCalendar = function() {};

        </script>
    <script src="js/app.js"></script>
    <script src="js/ui.js"></script> 
    <script src="js/ui-mobile.js"></script>
    <script>
    
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { if(window.renderTasks) window.renderTasks(); }, 800);
        });
    </script>
    <div id="viewMenuModal" class="mobile-modal hidden">
            <div class="mobile-modal-overlay" onclick="window.toggleViewMenu()"></div>
            <div class="mobile-modal-content">
                <div class="mobile-modal-header">
                    <h3 class="mobile-modal-title">Navegación</h3>
                    <button onclick="window.toggleViewMenu()" class="mobile-modal-close">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
                <div id="modalDynamicContent" class="mobile-modal-body"></div>
            </div>
        </div>
<div id="editModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
        <div class="bg-navy-800 w-full max-w-lg rounded-md border border-navy-600 overflow-hidden slide-up flex flex-col max-h-[90vh]">
            <div class="p-4 md:p-5 border-b border-navy-700 flex justify-between items-center shrink-0">
                <div class="flex items-center space-x-3">
                    <h3 id="editModalTitle" class="font-semibold text-base text-navy-50">Editar Tarea</h3>
                    <button id="btnBreakdownAI" onclick="breakdownTaskWithAI()" class="flex items-center space-x-1.5 px-2.5 py-1 bg-navy-700 border border-navy-600 hover:bg-navy-600 text-brand-400 rounded-md text-xs font-semibold transition-colors focus:outline-none">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
                        <span>Desglosar con IA</span>
                    </button>
                </div>
                <button onclick="closeEditModal()" class="text-navy-400 hover:text-navy-50 focus:outline-none"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
            <div class="p-4 md:p-5 overflow-y-auto space-y-4 flex-1">
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider ml-1 mb-1">Nombre</label>
                    <input type="text" id="editNameInput" class="w-full text-base bg-navy-900 border border-navy-700 text-navy-50 px-3 py-2.5 rounded-md focus:outline-none focus:border-brand-500">
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="space-y-1">
                        <label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider ml-1 mb-1">Estado</label>
                        <select id="editStatusInput" class="w-full text-xs bg-navy-900 border border-navy-700 text-navy-50 px-3 py-2 rounded-md focus:outline-none focus:border-brand-500 cursor-pointer"><option value="pending">Pendiente</option><option value="in_progress">En progreso</option><option value="completed">Completada</option></select>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider ml-1 mb-1">Área</label>
                        <select id="editAreaInput" onchange="updateEditParentDropdown()" class="w-full text-xs bg-navy-900 border border-navy-700 text-navy-50 px-3 py-2 rounded-md focus:outline-none focus:border-brand-500 cursor-pointer"></select>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider ml-1 mb-1">Contexto</label>
                        <select id="editContextInput" class="w-full text-xs bg-navy-900 border border-navy-700 text-navy-50 px-3 py-2 rounded-md focus:outline-none focus:border-brand-500 cursor-pointer"></select>
                    </div>
                    <div class="space-y-1">
                        <label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider ml-1 mb-1">Prioridad</label>
                        <select id="editPriorityInput" class="w-full text-xs bg-navy-900 border border-navy-700 text-navy-50 px-3 py-2 rounded-md focus:outline-none focus:border-brand-500 cursor-pointer">
                            <option value="urgente">Urgente</option>
                            <option value="alta">Alta</option>
                            <option value="media">Media</option>
                            <option value="baja">Baja</option>
                        </select>
                    </div>
                </div>
                
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider ml-1 mb-1">Dependencia</label>
                    <select id="editParentInput" class="w-full text-xs bg-navy-900 border border-navy-700 text-navy-50 px-3 py-2 rounded-md focus:outline-none focus:border-brand-500 cursor-pointer"></select>
                </div>

                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider ml-1 mb-1">Notas</label>
                    <textarea id="editNotesInput" rows="2" class="w-full text-xs bg-navy-900 border border-navy-700 text-navy-50 px-3 py-2 rounded-md focus:outline-none focus:border-brand-500 resize-y"></textarea>
                </div>

                <div class="space-y-2 border border-navy-700 rounded-md p-3 bg-navy-900/50">
                    <div class="flex justify-between items-center">
                        <label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider ml-1">Archivos Adjuntos</label>
                        <div class="relative">
                            <input type="file" id="editAttachFileInput" class="hidden" onchange="handleFileUpload(event, 'edit')">
                            <button onclick="document.getElementById('editAttachFileInput').click()" class="text-[9px] bg-navy-700 hover:bg-navy-600 text-navy-50 px-2.5 py-1 rounded transition-colors font-semibold flex items-center gap-1">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                                Añadir Archivo
                            </button>
                        </div>
                    </div>
                    <div id="editAttachmentLoading" class="hidden text-[10px] text-brand-500 font-bold animate-pulse">Subiendo a Google Drive...</div>
                    <div id="editAttachmentsList" class="flex flex-wrap gap-1.5 empty:hidden mt-1.5"></div>
                </div>

                <div class="pt-3 border-t border-navy-700 space-y-3">
                    <span class="block text-[10px] text-navy-400 font-bold uppercase tracking-wider ml-1 mb-1">Programación</span>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-1"><label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider ml-1 mb-1">Fecha Base</label><input type="date" id="editDateInput" onchange="validateAndProjectRecurrence('edit')" class="w-full text-xs bg-navy-900 border border-navy-700 text-navy-50 px-3 py-2 rounded-md focus:outline-none focus:border-brand-500 cursor-pointer" style="color-scheme: dark;"></div>
                        <div class="space-y-1"><label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider ml-1 mb-1">Hora</label><input type="time" id="editTimeInput" class="w-full text-xs bg-navy-900 border border-navy-700 text-navy-50 px-3 py-2 rounded-md focus:outline-none focus:border-brand-500 cursor-pointer" style="color-scheme: dark;"></div>
                    </div>
                    <div class="pt-1">
                        <label class="flex items-center space-x-2 bg-navy-900 border border-navy-700 px-3 py-2 rounded-md cursor-pointer w-max"><input type="checkbox" id="editReminderToggle" class="w-3.5 h-3.5 rounded-sm border-brand-500 text-brand-500 focus:ring-brand-500 bg-transparent"><span class="text-[11px] text-navy-300 font-semibold">Activar recordatorio</span></label>
                    </div>

                    <div class="flex items-center justify-between p-3 bg-navy-900 border border-navy-700 rounded-lg mt-3">
                        <div class="flex flex-col">
                            <span class="text-[11px] font-bold text-navy-50">Automatizar periodicidad</span>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="editHasRecurrence" onchange="toggleRecurrenceUI('edit')" class="sr-only peer">
                            <div class="w-9 h-5 bg-navy-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-navy-300 after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-brand-500"></div>
                        </label>
                    </div>

                    <div id="editRecurrenceContainer" class="hidden space-y-4 mt-3 p-3 border border-brand-500/30 bg-navy-900/50 rounded-lg">
                        <div>
                            <label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider mb-1">Frecuencia</label>
                            <select id="editFrequency" onchange="refreshRecurrenceUI('edit')" class="w-full text-xs bg-navy-800 border border-navy-600 text-navy-50 px-3 py-2 rounded-md focus:outline-none focus:border-brand-500 cursor-pointer">
                                <option value="daily">Diaria</option>
                                <option value="weekly">Semanal (Días específicos)</option>
                                <option value="monthly">Mensual</option>
                                <option value="yearly">Anual</option>
                                <option value="after_completion">Días después de completar</option>
                                <option value="custom">Mensual extendida (Personalizada)</option>
                            </select>
                        </div>
                        <div class="flex items-center space-x-3">
                            <span class="text-[11px] text-navy-300">Cada</span>
                            <input type="number" id="editInterval" value="1" min="1" onchange="validateAndProjectRecurrence('edit')" class="w-16 text-xs bg-navy-800 border border-navy-600 text-center text-navy-50 px-2 py-1.5 rounded-md focus:outline-none focus:border-brand-500">
                            <span id="editIntervalLabel" class="text-[11px] text-navy-300">días</span>
                        </div>

                        <div id="editWeeklyBlock" class="hidden space-y-2">
                            <label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider">Días de ejecución</label>
                            <div class="flex justify-between">
                                <button type="button" id="edit-day-0" onclick="toggleDay('edit', 0)" class="day-btn bg-navy-800">D</button>
                                <button type="button" id="edit-day-1" onclick="toggleDay('edit', 1)" class="day-btn bg-brand-500 text-navy-900 border-brand-500 scale-110">L</button>
                                <button type="button" id="edit-day-2" onclick="toggleDay('edit', 2)" class="day-btn bg-navy-800">M</button>
                                <button type="button" id="edit-day-3" onclick="toggleDay('edit', 3)" class="day-btn bg-navy-800">M</button>
                                <button type="button" id="edit-day-4" onclick="toggleDay('edit', 4)" class="day-btn bg-navy-800">J</button>
                                <button type="button" id="edit-day-5" onclick="toggleDay('edit', 5)" class="day-btn bg-navy-800">V</button>
                                <button type="button" id="edit-day-6" onclick="toggleDay('edit', 6)" class="day-btn bg-navy-800">S</button>
                            </div>
                        </div>

                        <div id="editMonthlyBlock" class="hidden space-y-3">
                            <div class="flex space-x-4 border-b border-navy-700 pb-2">
                                <label class="flex items-center space-x-2"><input type="radio" name="editMonthlyMode" value="fixed" checked onchange="refreshRecurrenceUI('edit')" class="text-brand-500 focus:ring-0 bg-transparent border-navy-600"><span class="text-[11px] text-navy-300">Día Fijo</span></label>
                                <label class="flex items-center space-x-2"><input type="radio" name="editMonthlyMode" value="business" onchange="refreshRecurrenceUI('edit')" class="text-brand-500 focus:ring-0 bg-transparent border-navy-600"><span class="text-[11px] text-navy-300">Día Hábil</span></label>
                            </div>
                            <div id="editMonthlyFixedBlock">
                                <label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider mb-1">Día objetivo</label>
                                <input type="number" id="editDayOfMonth" value="1" min="1" max="31" onchange="validateAndProjectRecurrence('edit')" class="w-full text-xs bg-navy-800 border border-navy-600 text-navy-50 px-3 py-2 rounded-md focus:outline-none focus:border-brand-500">
                            </div>
                            <div id="editMonthlyBusinessBlock" class="hidden">
                                <label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider mb-1">Índice Hábil</label>
                                <input type="number" id="editNthBusinessDay" value="5" min="1" max="31" onchange="validateAndProjectRecurrence('edit')" class="w-full text-xs bg-navy-800 border border-navy-600 text-navy-50 px-3 py-2 rounded-md focus:outline-none focus:border-brand-500">
                            </div>
                        </div>

                        <div id="editYearlyBlock" class="hidden grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider mb-1">Día</label>
                                <input type="number" id="editYearDay" value="1" min="1" max="31" onchange="validateAndProjectRecurrence('edit')" class="w-full text-xs bg-navy-800 border border-navy-600 text-navy-50 px-3 py-2 rounded-md focus:outline-none focus:border-brand-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider mb-1">Mes</label>
                                <select id="editYearMonth" onchange="validateAndProjectRecurrence('edit')" class="w-full text-xs bg-navy-800 border border-navy-600 text-navy-50 px-3 py-2 rounded-md focus:outline-none focus:border-brand-500">
                                    <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option><option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option><option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option><option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
                                </select>
                            </div>
                        </div>

                        <div id="editCustomBlock" class="hidden">
                            <label class="block text-[10px] font-bold text-navy-400 uppercase tracking-wider mb-1">Día del Mes</label>
                            <input type="number" id="editCustomDay" value="1" min="1" max="31" onchange="validateAndProjectRecurrence('edit')" class="w-full text-xs bg-navy-800 border border-navy-600 text-navy-50 px-3 py-2 rounded-md focus:outline-none focus:border-brand-500">
                        </div>

                        <div id="editCompletionBaseBlock">
                            <label class="flex items-center space-x-2 bg-navy-800 border border-navy-600 px-3 py-2 rounded-md cursor-pointer"><input type="checkbox" id="editBaseOnCompletion" onchange="validateAndProjectRecurrence('edit')" class="w-3.5 h-3.5 rounded-sm border-brand-500 text-brand-500 focus:ring-brand-500 bg-transparent"><span class="text-[11px] text-navy-300">Recalcular desde resolución real</span></label>
                        </div>
                        
                        <div id="editRecurrenceProjection" class="text-[10px] font-mono text-emerald-400 p-2 bg-navy-800 rounded border border-navy-600"></div>
                    </div>
                </div>
            </div>
            <div class="p-4 md:p-5 border-t border-navy-700 flex space-x-3 shrink-0">
                <button onclick="closeEditModal()" class="w-1/2 bg-navy-700 text-navy-50 py-2.5 rounded-md text-sm font-semibold hover:bg-navy-600 transition-colors focus:outline-none">Cancelar</button>
                <button onclick="saveEdit()" class="w-1/2 bg-brand-500 text-navy-900 py-2.5 rounded-md text-sm font-semibold hover:bg-brand-400 transition-colors focus:outline-none">Guardar Cambios</button>
            </div>
        </div>
    </div>
    
</main> </body>
</html>
